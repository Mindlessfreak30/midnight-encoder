<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Midnight Encoder</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg: #0a0a0a;
      --terminal-bg: #0d1117;
      --green: #00ff41;
      --green-dim: #00cc33;
      --scanline: rgba(0, 255, 65, 0.03);
    }
    
    body {
      background: var(--bg);
      min-height: 100vh;
      font-family: 'VT323', monospace;
      color: var(--green);
      overflow-x: hidden;
    }
    
    .crt-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        var(--scanline) 0px,
        var(--scanline) 1px,
        transparent 1px,
        transparent 2px
      );
      z-index: 1000;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    h1 {
      font-size: 2.5rem;
      text-shadow: 0 0 10px var(--green), 0 0 20px var(--green);
      animation: flicker 4s infinite;
    }
    
    .subtitle {
      font-size: 1rem;
      opacity: 0.7;
      margin-top: 0.5rem;
    }
    
    .terminal {
      background: var(--terminal-bg);
      border: 2px solid var(--green);
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.2), inset 0 0 40px rgba(0, 255, 65, 0.05);
    }
    
    .display {
      min-height: 120px;
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    
    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.2em;
      background: var(--green);
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
    }
    
    @keyframes blink {
      50% { opacity: 0; }
    }
    
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.8; }
      94% { opacity: 1; }
      97% { opacity: 0.9; }
      98% { opacity: 1; }
    }
    
    input, textarea {
      width: 100%;
      background: #000;
      border: 1px solid var(--green-dim);
      color: var(--green);
      font-family: 'VT323', monospace;
      font-size: 1.2rem;
      padding: 0.8rem;
      margin-bottom: 1rem;
      outline: none;
    }
    
    input:focus, textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
    }
    
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    
    .btn-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    
    button {
      flex: 1;
      min-width: 140px;
      background: transparent;
      border: 2px solid var(--green);
      color: var(--green);
      font-family: 'VT323', monospace;
      font-size: 1.3rem;
      padding: 0.8rem 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    
    button:hover {
      background: var(--green);
      color: #000;
      box-shadow: 0 0 20px var(--green);
    }
    
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    
    button.listening {
      background: var(--green);
      color: #000;
      animation: pulse 0.5s ease-in-out infinite;
    }
    
    @keyframes pulse {
      50% { box-shadow: 0 0 30px var(--green); }
    }
    
    .status {
      text-align: center;
      margin-top: 1rem;
      font-size: 1rem;
      min-height: 1.5rem;
    }
    
    .waveform {
      height: 40px;
      margin: 1rem 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }
    
    .wave-bar {
      width: 4px;
      background: var(--green);
      animation: wave 0.5s ease-in-out infinite;
    }
    
    .wave-bar:nth-child(odd) {
      animation-duration: 0.4s;
    }
    
    @keyframes wave {
      0%, 100% { height: 10px; }
      50% { height: 30px; }
    }
    
    .waveform.sending .wave-bar {
      animation: wave-send 0.3s ease-in-out infinite;
    }
    
    @keyframes wave-send {
      0%, 100% { height: 5px; }
      50% { height: 35px; }
    }
    
    .hidden {
      display: none;
    }
    
    .mode-select {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .mode-btn {
      flex: 1;
      padding: 0.5rem;
      font-size: 1rem;
    }
    
    .mode-btn.active {
      background: var(--green);
      color: #000;
    }
    
    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.9rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="crt-overlay"></div>
  
  <div class="container">
    <header>
      <h1>⟨ MIDNIGHT ENCODER ⟩</h1>
      <p class="subtitle">Sonic secret transmission // echo.exe</p>
    </header>
    
    <div class="terminal">
      <div class="mode-select">
        <button class="mode-btn active" id="sendModeBtn" onclick="setMode('send')">TRANSMIT</button>
        <button class="mode-btn" id="recvModeBtn" onclick="setMode('recv')">RECEIVE</button>
      </div>
      
      <div class="display" id="display">
<span class="cursor"></span>
      </div>
      
      <div class="waveform hidden" id="waveform">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      
      <div id="inputArea">
        <textarea id="messageInput" placeholder="Enter your secret message..." rows="3"></textarea>
        <div class="btn-row">
          <button id="actionBtn" onclick="handleAction()">TRANSMIT</button>
        </div>
      </div>
      
      <div id="recvArea" class="hidden">
        <div class="btn-row">
          <button id="listenBtn" onclick="startListening()">START LISTENING</button>
        </div>
      </div>
      
      <div class="status" id="status">Ready for transmission...</div>
    </div>
    
    <footer>
      ▓▓ Secure. Ephemeral. Untraceable. ▓▓
    </footer>
  </div>

  <script>
    let mode = 'send';
    let audioContext = null;
    let analyser = null;
    let mediaStream = null;
    let isListening = false;
    
    const display = document.getElementById('display');
    const status = document.getElementById('status');
    const waveform = document.getElementById('waveform');
    const inputArea = document.getElementById('inputArea');
    const recvArea = document.getElementById('recvArea');
    const actionBtn = document.getElementById('actionBtn');
    const listenBtn = document.getElementById('listenBtn');
    const messageInput = document.getElementById('messageInput');
    
    // Audio config
    const FREQUENCIES = {
      // Frequency shift keying - each character gets a unique tone
      base: 18000,
      spread: 400
    };
    
    function setMode(newMode) {
      mode = newMode;
      document.getElementById('sendModeBtn').classList.toggle('active', mode === 'send');
      document.getElementById('recvModeBtn').classList.toggle('active', mode === 'recv');
      inputArea.classList.toggle('hidden', mode !== 'send');
      recvArea.classList.toggle('hidden', mode !== 'recv');
      actionBtn.textContent = mode === 'send' ? 'TRANSMIT' : 'TRANSMIT';
      display.innerHTML = '<span class="cursor"></span>';
      status.textContent = mode === 'send' ? 'Ready for transmission...' : 'Waiting for incoming signal...';
    }
    
    function typeText(text, speed = 30) {
      return new Promise(resolve => {
        display.innerHTML = '';
        let i = 0;
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        
        const interval = setInterval(() => {
          if (i < text.length) {
            display.insertBefore(document.createTextNode(text[i]), cursor);
            i++;
          } else {
            clearInterval(interval);
            display.appendChild(cursor);
            resolve();
          }
        }, speed);
      });
    }
    
    async function handleAction() {
      const msg = messageInput.value.trim();
      if (!msg) {
        status.textContent = 'Error: No message to transmit';
        return;
      }
      
      status.textContent = 'Transmitting...';
      waveform.classList.remove('hidden');
      waveform.classList.add('sending');
      
      try {
        await transmitMessage(msg);
        status.textContent = 'Transmission complete!';
        typeText('>> Message sent into the void...\n>> Awaiting response...');
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
      }
      
      waveform.classList.add('hidden');
      waveform.classList.remove('sending');
    }
    
    async function transmitMessage(msg) {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      
      const encoded = btoa(msg); // Base64 encode
      const sampleRate = audioContext.sampleRate;
      const toneDuration = 0.15; // seconds per character
      const gapDuration = 0.05;
      
      const bufferSize = sampleRate * (encoded.length * (toneDuration + gapDuration) + 0.5);
      const buffer = audioContext.createBuffer(1, bufferSize, sampleRate);
      const data = buffer.getChannelData(0);
      
      let offset = 0;
      
      // Preamble: attention tone
      const preambleFreq = 20000;
      for (let i = 0; i < sampleRate * 0.3; i++) {
        data[i] = Math.sin(2 * Math.PI * preambleFreq * (i / sampleRate)) * 0.3;
      }
      offset += sampleRate * 0.3;
      
      // Encode each character
      for (let char of encoded) {
        const charCode = char.charCodeAt(0);
        const freq = FREQUENCIES.base + (charCode * FREQUENCIES.spread);
        
        for (let i = 0; i < sampleRate * toneDuration; i++) {
          const t = i / sampleRate;
          const envelope = Math.sin(Math.PI * t / toneDuration); // Smooth envelope
          data[offset + i] = Math.sin(2 * Math.PI * freq * t) * 0.25 * envelope;
        }
        offset += sampleRate * toneDuration;
        
        // Gap between tones
        for (let i = 0; i < sampleRate * gapDuration; i++) {
          data[offset + i] = 0;
        }
        offset += sampleRate * gapDuration;
      }
      
      // Postamble
      for (let i = 0; i < sampleRate * 0.2; i++) {
        data[offset + i] = Math.sin(2 * Math.PI * 22000 * (i / sampleRate)) * 0.2;
      }
      
      const source = audioContext.createBufferSource();
      source.buffer = buffer;
      source.connect(audioContext.destination);
      source.start();
      
      await new Promise(r => source.onended = r);
    }
    
    async function startListening() {
      try {
        status.textContent = 'Listening for ultrasonic signals...';
        listenBtn.textContent = 'LISTENING...';
        listenBtn.classList.add('listening');
        waveform.classList.remove('hidden');
        
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = audioContext.createMediaStreamSource(mediaStream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;
        source.connect(analyser);
        
        isListening = true;
        await detectTones();
        
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
        console.error(e);
      }
    }
    
    async function detectTones() {
      if (!isListening) return;
      
      const bufferLength = analyser.fftSize;
      const dataArray = new Uint8Array(bufferLength);
      const sampleRate = audioContext.sampleRate;
      
      let silenceCount = 0;
      let charBuffer = '';
      let lastCharTime = Date.now();
      const charTimeout = 2000;
      
      const detect = () => {
        if (!isListening) return;
        
        analyser.getByteFrequencyData(dataArray);
        
        // Look for frequencies in our range
        const binSize = sampleRate / bufferLength;
        const startBin = Math.floor(FREQUENCIES.base / binSize);
        const endBin = Math.floor((FREQUENCIES.base + 2000) / binSize);
        
        let maxFreq = 0;
        let maxValue = 0;
        
        for (let i = startBin; i < endBin && i < bufferLength; i++) {
          if (dataArray[i] > maxValue) {
            maxValue = dataArray[i];
            maxFreq = FREQUENCIES.base + ((i - startBin) * FREQUENCIES.spread);
          }
        }
        
        if (maxValue > 100) { // Threshold
          silenceCount = 0;
          const charCode = Math.round((maxFreq - FREQUENCIES.base) / FREQUENCIES.spread);
          if (charCode > 0 && charCode < 256) {
            charBuffer += String.fromCharCode(charCode);
            lastCharTime = Date.now();
            
            // Visual feedback
            display.innerHTML = charBuffer.replace(/./g, c => c + ' ') + '<span class="cursor"></span>';
            status.textContent = 'Receiving signal...';
          }
        } else {
          silenceCount++;
          if (silenceCount > 50 && charBuffer.length > 0) {
            // Try to decode
            try {
              const decoded = atob(charBuffer);
              typeText('>> TRANSMISSION RECEIVED\n>> ------------------\n' + decoded);
              status.textContent = 'Message received!';
            } catch (e) {
              status.textContent = 'Incomplete signal...';
            }
            charBuffer = '';
          }
        }
        
        // Timeout - reset
        if (Date.now() - lastCharTime > charTimeout && charBuffer.length > 0) {
          charBuffer = '';
          status.textContent = 'Signal lost. Listening...';
        }
        
        requestAnimationFrame(detect);
      };
      
      detect();
    }
    
    function stopListening() {
      isListening = false;
      listenBtn.textContent = 'START LISTENING';
      listenBtn.classList.remove('listening');
      waveform.classList.add('hidden');
      
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
      }
      
      status.textContent = 'Listening stopped.';
    }
    
    // Initial welcome message
    setTimeout(() => {
      typeText('>> MIDNIGHT ENCODER v1.0\n>> ----------------\n>> Select TRANSMIT to send a message\n>> Select RECEIVE to listen for incoming\n>> Sound waves carry your secret...\n', 20);
    }, 500);
  </script>
</body>
</html>
